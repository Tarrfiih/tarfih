<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tarfih - Tourism & Entertainment</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
</head>

<body>
    <div class="app-container">
        <header>
            <div class="header-left" style="display: flex; align-items: center; gap: 16px;">
                <div class="logo">TARFIH</div>
                <button class="theme-toggle" id="theme-toggle" aria-label="Toggle Dark Mode">
                    <svg class="moon-icon" viewBox="0 0 24 24">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path>
                    </svg>
                    <svg class="sun-icon" viewBox="0 0 24 24">
                        <circle cx="12" cy="12" r="5"></circle>
                        <line x1="12" y1="1" x2="12" y2="3"></line>
                        <line x1="12" y1="21" x2="12" y2="23"></line>
                        <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"></line>
                        <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"></line>
                        <line x1="1" y1="12" x2="3" y2="12"></line>
                        <line x1="21" y1="12" x2="23" y2="12"></line>
                        <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"></line>
                        <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>
                    </svg>
                </button>
                <select id="location-select" class="location-select">
                    <option value="Annaba" selected>Annaba</option>
                    <option value="Algiers">Algiers</option>
                    <option value="Oran">Oran</option>
                    <option value="Jijel">Jijel</option>
                    <option value="Skikda">Skikda</option>
                    <option value="Adrar">Adrar</option>
                    <option value="Tamanrasset">Tamanrasset</option>
                    <option value="Tamenrasset">Tamenrasset</option>
                    <option value="Timimoun">Timimoun</option>
                    <option value="Ilizi">Ilizi</option>
                    <option value="Djanet">Djanet</option>
                    <option value="Current">📍 Use My Location</option>
                </select>
            </div>
            <nav class="desktop-nav">
                <a class="nav-item" href="index.html">Home</a>
                <a class="nav-item" href="explore.html">Explore</a>
                <a class="nav-item" href="ai-search.html">AI Search</a>
                <a class="nav-item" href="partners.html">Partners</a>
            </nav>
            <a class="user-profile nav-item" href="profile.html" style="cursor: pointer; display: flex; align-items: center; color: var(--text-muted); text-decoration: none;">
                <svg viewBox="0 0 24 24" width="24" height="24" fill="currentColor">
                    <path
                        d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 3c1.66 0 3 1.34 3 3s-1.34 3-3 3-3-1.34-3-3 1.34-3 3-3zm0 14.2c-2.5 0-4.71-1.28-6-3.22.03-1.99 4-3.08 6-3.08 1.99 0 5.97 1.09 6 3.08-1.29 1.94-3.5 3.22-6 3.22z" />
                </svg>
            </a>
        </header>

        <main id="app-content">
            <!-- In Progress Message (Hidden by default) -->
            <div id="in-progress-message" class="in-progress-container" style="display: none;">
                <div class="in-progress-icon">🚧</div>
                <h3>We're expanding!</h3>
                <p>Tarfih is currently only available fully in Annaba. We are working hard to bring the best experiences
                    to <span id="target-city-name">this location</span> soon.</p>
            </div>

<section id="favorites" class="section active">
                <h2>Your Favorites</h2>
                <div class="card-grid" id="favorites-grid">
                    <p style="color: var(--text-muted); text-align: center; margin-top: 40px;">No favorites yet. Start
                        exploring!</p>
                </div>
            </section>

        </main>

        <nav class="bottom-nav">
            <a class="nav-item" href="index.html" style="text-decoration:none;">
                <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
                <div class="nav-label">Home</div>
            </a>
            <a class="nav-item" href="explore.html" style="text-decoration:none;">
                <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                    <path
                        d="M15.5 14h-.79l-.28-.27C15.41 12.59 16 11.11 16 9.5 16 5.91 13.09 3 9.5 3S3 5.91 3 9.5 5.91 16 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z" />
                </svg>
                <div class="nav-label">Explore</div>
            </a>
            <a class="nav-item" href="ai-search.html" style="text-decoration:none;">
                <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                    <path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
                </svg>
                <div class="nav-label">AI Search</div>
            </a>
            <a class="nav-item" href="partners.html" style="text-decoration:none;">
                <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                    <path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/>
                </svg>
                <div class="nav-label">Partners</div>
            </a>
            <a class="nav-item" href="profile.html" style="text-decoration:none;">
                <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24">
                    <path
                        d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z" />
                </svg>
                <div class="nav-label">Profile</div>
            </a>
        </nav>
    </div>
    <div id="modal-container"></div>
    <script src="db.js"></script>
    <script src="script.js"></script>
</body>
</html>
